name: Build and lint

on:
    - push
    - pull_request

jobs:
    build-and-lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - name: Install compiler
              id: install_cc
              uses: rlalik/setup-cpp-compiler@master
              with:
                  compiler: latest
            - name: Check format
              run: |
                  find . -path ./build -prune -o -type f -name '*.[c|h]' -print | xargs clang-format-18 --style=file --dry-run -Werror
            - name: Install clang-tidy
              run: sudo apt-get install clang-tidy
            - name: Run clang-tidy
              run: |
                  # -DCMAKE_EXPORT_COMPILE_COMMANDS=ON is important for clang-tidy
                  run-clang-tidy -p . -header-filter='.*'
            - name: Configure
              run: |
                  # -DCMAKE_EXPORT_COMPILE_COMMANDS=ON is important for clang-tidy
                  cmake . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -Wno-dev
            - name: Build
              run: |
                  cmake --build build
            - name: Lint
              run: |
                  run-clang-tidy-18 -p=build
